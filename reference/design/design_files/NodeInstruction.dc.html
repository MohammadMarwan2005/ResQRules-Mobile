<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="ds/styles.css">
<script src="ds/_ds_bundle.js"></script>
</helmet>
<div style="display:flex; flex-direction:column; height:100%; gap:12px; box-sizing:border-box;">
  <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.PageCitation" from="./ds/_ds_bundle.js" page="{{ page }}" dir="{{ dir }}" hint-size="48px,16px"></x-import>
  <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.Card" from="./ds/_ds_bundle.js" dir="{{ dir }}" hint-size="100%,140px">{{ text }}</x-import>
  <div style="flex:1; min-height:12px;"></div>
  <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.Button" from="./ds/_ds_bundle.js" on-click="{{ onContinue }}" dir="{{ dir }}" hint-size="100%,56px">{{ continueLabel }}</x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:540},&quot;node&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;InstructionNode&quot;},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;en&quot;,&quot;ar&quot;],&quot;default&quot;:&quot;en&quot;,&quot;tsType&quot;:&quot;'en' | 'ar'&quot;},&quot;onContinue&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const lang = p.lang || 'en';
    const isAr = lang === 'ar';
    const dir = isAr ? 'rtl' : 'ltr';
    const node = p.node || { page: 7, text: { en: 'Apply firm, direct pressure to the wound. Do not release until relief arrives.', ar: 'اضغط بقوة ومباشرة على الجرح ولا تترك الضغط حتى وصول المساعدة.' } };
    const LBL = { en: 'Continue', ar: 'استمرار' };
    return {
      page: node.page,
      dir,
      text: (node.text && node.text[lang]) || '',
      continueLabel: LBL[lang],
      onContinue: (e) => { if (p.onContinue) p.onContinue(e); },
    };
  }
}
</script>
</body>
</html>
