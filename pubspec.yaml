name: resq_rules
description: "ResQRules — bilingual first-aid clinical decision-support for field paramedics."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.2

  # Models / codegen annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Functional error handling
  fpdart: ^1.1.1

  # Routing
  go_router: ^14.6.2

  # Local persistence
  shared_preferences: ^2.3.3

  # UI
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5
  injectable_generator: ^2.6.2

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
