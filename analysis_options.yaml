# Static analysis configuration for ResQRules.
# See https://dart.dev/guides/language/analysis-options
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"          # json_serializable / retrofit output
    - "**/*.freezed.dart"    # freezed output
    - "**/*.config.dart"     # injectable output
    - "lib/presentation/localization/gen/**"  # gen-l10n output
  errors:
    invalid_annotation_target: ignore  # freezed + json_serializable on factory params

linter:
  rules:
    prefer_single_quotes: true
    require_trailing_commas: true
    directives_ordering: true
    unawaited_futures: true
