name: Deploy web to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.2
          channel: stable
          cache: true

      - run: flutter pub get

      # Generated sources (*.g.dart / *.freezed.dart / *.config.dart) and the
      # l10n output are committed, so a plain build is enough. base-href must
      # match the repo name for a GitHub Pages project site.
      - run: flutter build web --release --base-href /ResQRules-Mobile/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
