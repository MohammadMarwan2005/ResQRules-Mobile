<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="ds/styles.css">
<script src="ds/_ds_bundle.js"></script>
</helmet>
<div style="display:flex; flex-direction:column; height:100%; gap:12px; box-sizing:border-box;">
  <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.PageCitation" from="./ds/_ds_bundle.js" page="{{ page }}" dir="{{ dir }}" hint-size="48px,16px"></x-import>
  <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.Card" from="./ds/_ds_bundle.js" variant="stub" dir="{{ dir }}" hint-size="100%,120px">
    <div style="font-family:var(--font-sans); font-size:16px; font-weight:var(--weight-regular); line-height:1.6; color:var(--neutral-900); text-align:{{ textAlign }};">{{ stubNote }}</div>
    <div style="height:1px; background:var(--neutral-300); margin:14px 0;"></div>
    <div style="font-family:var(--font-sans); font-size:14px; font-weight:var(--weight-regular); line-height:1.5; color:var(--neutral-600); text-align:{{ textAlign }};">{{ unavailable }}</div>
  </x-import>
  <div style="flex:1; min-height:12px;"></div>
  <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.OutlinedButton" from="./ds/_ds_bundle.js" variant="neutral" on-click="{{ onHome }}" dir="{{ dir }}" hint-size="100%,56px">{{ homeLabel }}</x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:420},&quot;node&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;JumpStubNode&quot;},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;en&quot;,&quot;ar&quot;],&quot;default&quot;:&quot;en&quot;,&quot;tsType&quot;:&quot;'en' | 'ar'&quot;},&quot;onHome&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const lang = p.lang || 'en';
    const isAr = lang === 'ar';
    const dir = isAr ? 'rtl' : 'ltr';
    const node = p.node || { page: 14, stubNote: { en: 'Oxygen algorithm.', ar: 'خوارزمية الأكسجين.' } };
    const LBL = { home: { en: 'Back to Home', ar: 'العودة إلى الرئيسية' }, unavailable: { en: 'Protocol not yet available', ar: 'البروتوكول غير متوفر بعد' } };
    return {
      page: node.page,
      dir,
      textAlign: isAr ? 'right' : 'left',
      stubNote: (node.stubNote && node.stubNote[lang]) || '',
      unavailable: LBL.unavailable[lang],
      homeLabel: LBL.home[lang],
      onHome: (e) => { if (p.onHome) p.onHome(e); },
    };
  }
}
</script>
</body>
</html>
