<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="ds/styles.css">
<script src="ds/_ds_bundle.js"></script>
</helmet>
<div style="display:flex; flex-direction:column; height:100%; gap:16px; box-sizing:border-box;">
  <div style="display:flex; flex-direction:row; align-items:center; justify-content:space-between; gap:8px;">
    <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.PageCitation" from="./ds/_ds_bundle.js" page="{{ page }}" dir="{{ dir }}" hint-size="48px,16px"></x-import>
    <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.TierBadge" from="./ds/_ds_bundle.js" current="{{ tier }}" lang="{{ lang }}" dir="{{ dir }}" hint-size="64px,40px"></x-import>
  </div>
  <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.Card" from="./ds/_ds_bundle.js" variant="callout" dir="{{ dir }}" hint-size="100%,96px">
    <div style="font-family:var(--font-sans); font-size:12px; font-weight:var(--weight-semibold); line-height:1.4; color:var(--neutral-600); text-transform:uppercase; letter-spacing:0.04em; text-align:{{ textAlign }};">{{ interventionLabel }}</div>
    <div style="margin-top:6px; font-family:var(--font-sans); font-size:14px; font-weight:var(--weight-regular); line-height:1.5; color:var(--neutral-900); text-align:{{ textAlign }};">{{ intervention }}</div>
  </x-import>
  <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.Card" from="./ds/_ds_bundle.js" dir="{{ dir }}" hint-size="100%,64px">
    <div style="font-family:var(--font-sans); font-size:16px; font-weight:var(--weight-semibold); line-height:1.5; color:var(--neutral-900); text-align:{{ textAlign }};">{{ text }}</div>
  </x-import>
  <div style="flex:1; min-height:8px;"></div>
  <div style="display:flex; flex-direction:column; gap:12px;">
    <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.OutlinedButton" from="./ds/_ds_bundle.js" variant="primary" on-click="{{ onYes }}" dir="{{ dir }}" hint-size="100%,56px">{{ yesLabel }}</x-import>
    <x-import component-from-global-scope="ResQRulesDesignSystem_3e3070.OutlinedButton" from="./ds/_ds_bundle.js" variant="success" on-click="{{ onNo }}" dir="{{ dir }}" hint-size="100%,56px">{{ noLabel }}</x-import>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:560},&quot;node&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;HemQuestionNode&quot;},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;en&quot;,&quot;ar&quot;],&quot;default&quot;:&quot;en&quot;,&quot;tsType&quot;:&quot;'en' | 'ar'&quot;},&quot;onSelect&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(opt: Option) =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const lang = p.lang || 'en';
    const isAr = lang === 'ar';
    const dir = isAr ? 'rtl' : 'ltr';
    const node = p.node || {
      page: 9,
      tier: 2,
      intervention: { en: 'Pack the wound, then apply a tourniquet 5 cm above.', ar: 'احشُ الجرح ثم ضع عاصبة على بعد 5 سم فوقه.' },
      text: { en: 'Active bleeding?', ar: 'هل النزيف نشط؟' },
      options: [
        { id: 'yes', label: { en: 'yes — still bleeding', ar: 'نعم — لا يزال ينزف' } },
        { id: 'no', label: { en: 'no — bleeding controlled', ar: 'لا — تم إيقاف النزيف' } },
      ],
    };
    const LBL = { intervention: { en: 'Intervention applied', ar: 'تم تطبيق التدخل' } };
    const yes = (node.options || [])[0] || { id: 'yes', label: {} };
    const no = (node.options || [])[1] || { id: 'no', label: {} };
    return {
      page: node.page,
      tier: node.tier,
      lang,
      dir,
      textAlign: isAr ? 'right' : 'left',
      interventionLabel: LBL.intervention[lang],
      intervention: (node.intervention && node.intervention[lang]) || '',
      text: (node.text && node.text[lang]) || '',
      yesLabel: (yes.label && yes.label[lang]) || 'yes',
      noLabel: (no.label && no.label[lang]) || 'no',
      onYes: () => { if (p.onSelect) p.onSelect(yes); },
      onNo: () => { if (p.onSelect) p.onSelect(no); },
    };
  }
}
</script>
</body>
</html>
